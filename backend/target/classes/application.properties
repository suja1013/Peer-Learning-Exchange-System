
# Server
server.port=8080

# MySQL Database
spring.datasource.url=jdbc:mysql://localhost:3306/peerlearningexchangedb
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=create
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# JWT Configuration
app.jwt.secret=PeerLearningExchangeSystemSecretKeyForJWTTokenGeneration2026!
app.jwt.expiration-ms=86400000

# Activation Points
app.points.registration-bonus=100
app.points.session-cost=20

# CORS
app.cors.allowed-origins=http://localhost:3000

# Logging
logging.level.com.peerlearningsystem=DEBUG
logging.level.org.springframework.security=INFO
